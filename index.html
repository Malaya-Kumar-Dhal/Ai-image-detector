<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI_DETECT.exe — Forensic Image Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00e676;
    --red: #ff3b3b;
    --amber: #ffb300;
    --bg: #07080a;
    --surface: rgba(255,255,255,0.02);
    --border: rgba(255,255,255,0.06);
    --muted: #555f6e;
    --text: #c8ccd4;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0,230,118,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 820px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 52px 0 36px;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,230,118,0.08);
    border: 1px solid rgba(0,230,118,0.2);
    border-radius: 4px;
    padding: 6px 18px;
    margin-bottom: 24px;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--green);
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  h1 {
    font-family: var(--sans);
    font-size: clamp(36px, 7vw, 64px);
    font-weight: 700;
    letter-spacing: -1px;
    color: #fff;
    line-height: 1;
    margin-bottom: 10px;
  }

  h1 span { color: var(--green); }

  .subtitle {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--muted);
  }

  /* API Key input */
  .api-section {
    margin-bottom: 20px;
  }

  .api-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .api-row {
    display: flex;
    gap: 10px;
  }

  .api-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: rgba(0,230,118,0.4); }
  .api-input::placeholder { color: var(--muted); }

  .btn-save {
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.3);
    color: var(--green);
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-save:hover { background: rgba(0,230,118,0.2); }

  /* Drop zone */
  #drop-zone {
    border: 2px dashed rgba(0,230,118,0.2);
    border-radius: 8px;
    padding: 80px 32px;
    text-align: center;
    cursor: pointer;
    background: rgba(255,255,255,0.01);
    transition: all 0.2s;
    position: relative;
  }

  #drop-zone.drag-over {
    border-color: var(--green);
    background: rgba(0,230,118,0.04);
  }

  #drop-zone:hover {
    border-color: rgba(0,230,118,0.4);
    background: rgba(0,230,118,0.02);
  }

  .drop-icon {
    font-size: 48px;
    opacity: 0.3;
    margin-bottom: 20px;
    display: block;
  }

  .drop-title {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .drop-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* Preview panel */
  #preview-panel { display: none; }

  .panel-header {
    background: rgba(0,0,0,0.4);
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 8px 8px 0 0;
  }

  .btn-clear {
    background: none;
    border: 1px solid rgba(255,59,59,0.3);
    color: var(--red);
    cursor: pointer;
    padding: 3px 14px;
    font-size: 10px;
    letter-spacing: 1px;
    border-radius: 3px;
    font-family: var(--mono);
    transition: all 0.2s;
  }

  .btn-clear:hover { background: rgba(255,59,59,0.1); }

  .img-wrap {
    background: #000;
    position: relative;
    overflow: hidden;
    border-radius: 0 0 8px 8px;
    border: 1px solid var(--border);
    border-top: none;
  }

  #preview-img {
    width: 100%;
    max-height: 420px;
    object-fit: contain;
    display: block;
  }

  /* Scan overlay */
  #scan-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.72);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  #scan-overlay.active { display: flex; }

  .spinner-wrap {
    position: relative;
    width: 64px;
    height: 64px;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid transparent;
  }

  .ring-outer {
    inset: 0;
    border-top-color: var(--green);
    border-right-color: rgba(0,230,118,0.2);
    border-bottom-color: rgba(0,230,118,0.2);
    border-left-color: rgba(0,230,118,0.2);
    animation: spin 1s linear infinite;
  }

  .ring-inner {
    inset: 10px;
    border-bottom-color: var(--green);
    border-top-color: rgba(0,230,118,0.1);
    border-right-color: rgba(0,230,118,0.1);
    border-left-color: rgba(0,230,118,0.1);
    animation: spin 1.5s linear infinite reverse;
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green);
    font-size: 18px;
  }

  .scan-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--green);
  }

  /* Buttons */
  .btn-analyze {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, rgba(0,230,118,0.15), rgba(0,230,118,0.05));
    border: 1px solid rgba(0,230,118,0.4);
    color: var(--green);
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 4px;
    font-family: var(--mono);
    font-weight: 700;
    border-radius: 6px;
    margin-top: 14px;
    transition: all 0.2s;
  }

  .btn-analyze:hover {
    background: rgba(0,230,118,0.2);
    box-shadow: 0 0 30px rgba(0,230,118,0.2);
  }

  .btn-reset {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 3px;
    font-family: var(--mono);
    border-radius: 6px;
    margin-top: 12px;
    transition: all 0.2s;
  }

  .btn-reset:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  /* Error */
  #error-box {
    display: none;
    background: rgba(255,59,59,0.08);
    border: 1px solid rgba(255,59,59,0.3);
    border-radius: 6px;
    padding: 16px;
    margin-top: 14px;
    color: var(--red);
    font-size: 12px;
    letter-spacing: 1px;
    text-align: center;
  }

  /* Results */
  #results { display: none; margin-top: 16px; }

  .verdict-banner {
    border-radius: 8px;
    padding: 30px;
    text-align: center;
    margin-bottom: 14px;
  }

  .verdict-label-small {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .verdict-text {
    font-family: var(--sans);
    font-size: clamp(30px, 6vw, 52px);
    font-weight: 700;
    letter-spacing: 5px;
    margin-bottom: 18px;
  }

  .score-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 6px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  .score-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
    max-width: 420px;
    margin: 0 auto;
  }

  .score-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  }

  .confidence-label {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* Signals */
  .signals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .signal-card {
    background: var(--surface);
    border-radius: 6px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }

  .signal-card.flagged { border: 1px solid rgba(255,59,59,0.25); }
  .signal-card.pass { border: 1px solid rgba(255,255,255,0.05); }

  .signal-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 7px;
  }

  .signal-name {
    font-size: 10px;
    color: #888;
    letter-spacing: 1px;
  }

  .signal-badge {
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 9px;
    border-radius: 2px;
  }

  .signal-badge.flagged {
    background: rgba(255,59,59,0.15);
    color: var(--red);
    border: 1px solid rgba(255,59,59,0.3);
  }

  .signal-badge.pass {
    background: rgba(0,230,118,0.1);
    color: var(--green);
    border: 1px solid rgba(0,230,118,0.2);
  }

  .signal-detail {
    font-size: 12px;
    color: #6b7585;
    line-height: 1.5;
  }

  /* Summary */
  .summary-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 14px;
  }

  .summary-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .summary-text {
    font-size: 14px;
    color: #9aa3b0;
    line-height: 1.75;
    font-family: var(--sans);
    font-weight: 400;
  }

  /* Animations */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .fade-in { animation: fadeIn 0.4s ease forwards; }

  /* ── MOBILE STYLES ── */
  @media(max-width: 600px) {

    body { padding: 0 12px 60px; }

    header { padding: 32px 0 24px; }

    .status-badge {
      font-size: 9px;
      letter-spacing: 2px;
      padding: 5px 12px;
      gap: 8px;
    }

    h1 { font-size: clamp(28px, 10vw, 44px); letter-spacing: -0.5px; }

    .subtitle { font-size: 10px; letter-spacing: 2px; }

    /* Stack API key row vertically */
    .api-row { flex-direction: column; gap: 8px; }

    .api-input {
      font-size: 14px; /* prevent iOS zoom on focus */
      padding: 14px 16px;
    }

    .btn-save {
      width: 100%;
      padding: 14px;
      font-size: 12px;
      text-align: center;
    }

    /* Drop zone — tap friendly */
    #drop-zone {
      padding: 48px 20px;
      border-width: 2px;
    }

    .drop-icon { font-size: 38px; margin-bottom: 14px; }

    .drop-title { font-size: 16px; letter-spacing: 1px; }

    .drop-sub {
      font-size: 10px;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    /* Tighten preview header */
    .panel-header { padding: 10px 12px; font-size: 10px; }

    #preview-img { max-height: 280px; }

    /* Bigger analyze button — easier to tap */
    .btn-analyze {
      padding: 20px;
      font-size: 13px;
      letter-spacing: 3px;
      margin-top: 12px;
      /* Active state for touch */
      -webkit-tap-highlight-color: transparent;
    }

    .btn-analyze:active { background: rgba(0,230,118,0.25); }

    .btn-reset {
      padding: 18px;
      font-size: 12px;
    }

    /* Verdict banner */
    .verdict-banner { padding: 22px 16px; }

    .verdict-text { font-size: clamp(24px, 8vw, 38px); letter-spacing: 3px; }

    .score-labels { font-size: 9px; }

    .score-track { max-width: 100%; }

    /* Signals — single column always on mobile */
    .signals-grid {
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .signal-card { padding: 14px; }

    .signal-name { font-size: 10px; }

    .signal-detail { font-size: 12px; line-height: 1.6; }

    /* Summary */
    .summary-box { padding: 16px; }

    .summary-text { font-size: 13px; line-height: 1.7; }

    /* Error box */
    #error-box { font-size: 12px; padding: 14px; line-height: 1.5; }
  }

  /* Extra small phones */
  @media(max-width: 360px) {
    h1 { font-size: 26px; }
    .status-badge { font-size: 8px; letter-spacing: 1px; }
    .verdict-text { font-size: 22px; }
  }

  /* Touch devices — remove hover effects that feel wrong */
  @media(hover: none) {
    #drop-zone:hover { border-color: rgba(0,230,118,0.2); background: rgba(255,255,255,0.01); }
    .btn-analyze:hover { background: linear-gradient(135deg, rgba(0,230,118,0.15), rgba(0,230,118,0.05)); box-shadow: none; }
    .btn-reset:hover { color: var(--muted); border-color: rgba(255,255,255,0.1); }

    /* Add active states instead */
    #drop-zone:active { border-color: var(--green); background: rgba(0,230,118,0.04); }
    .btn-analyze:active { background: rgba(0,230,118,0.25); }
    .btn-reset:active { color: #fff; }
    .btn-clear:active { background: rgba(255,59,59,0.15); }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="status-badge">
      <span class="dot"></span>
      GROQ // LLAMA 4 SCOUT VISION
    </div>
    <h1>AI_DETECT<span>.exe</span></h1>
    <p class="subtitle">NEURAL FORENSICS // IMAGE AUTHENTICITY SCANNER</p>
  </header>

  <!-- API Key -->
  <div class="api-section">
    <span class="api-label">// GROQ API KEY &nbsp;·&nbsp; <a href="https://console.groq.com/keys" target="_blank" style="color:var(--green);text-decoration:none;letter-spacing:1px;font-size:10px;">GET FREE KEY ↗</a></span>
    <div class="api-row">
      <input class="api-input" type="password" id="api-key" placeholder="gsk_..." autocomplete="off" oninput="saveKey()"/>
      <button class="btn-save" id="save-btn">● READY</button>
    </div>
  </div>

  <!-- Drop zone -->
  <div id="drop-zone"
    ondrop="handleDrop(event)"
    ondragover="handleDragOver(event)"
    ondragleave="handleDragLeave(event)"
    onclick="document.getElementById('file-input').click()">
    <span class="drop-icon">⬡</span>
    <div class="drop-title">TAP OR DROP IMAGE</div>
    <div class="drop-sub">SELECT FROM CAMERA OR GALLERY&nbsp;//&nbsp;JPG · PNG · WEBP</div>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this.files[0])"/>
  </div>

  <!-- Preview panel -->
  <div id="preview-panel">
    <div class="panel-header">
      <span>TARGET LOADED</span>
      <button class="btn-clear" onclick="resetAll()">✕ CLEAR</button>
    </div>
    <div class="img-wrap">
      <img id="preview-img" src="" alt="Preview"/>
      <div id="scan-overlay">
        <div class="spinner-wrap">
          <div class="ring ring-outer"></div>
          <div class="ring ring-inner"></div>
          <div class="ring-center">⬡</div>
        </div>
        <div class="scan-label">SCANNING...</div>
      </div>
    </div>
  </div>

  <button class="btn-analyze" id="analyze-btn" style="display:none" onclick="analyze()">
    ▶ RUN FORENSIC ANALYSIS
  </button>

  <div id="error-box"></div>

  <!-- Results -->
  <div id="results">
    <div class="verdict-banner" id="verdict-banner">
      <div class="verdict-label-small">VERDICT</div>
      <div class="verdict-text" id="verdict-text"></div>
      <div class="score-labels">
        <span>REAL</span>
        <span id="score-label">AI SCORE: —</span>
        <span>AI</span>
      </div>
      <div class="score-track">
        <div class="score-fill" id="score-fill" style="width:0%"></div>
      </div>
      <div class="confidence-label" id="conf-label">CONFIDENCE: —</div>
    </div>

    <div class="signals-grid" id="signals-grid"></div>

    <div class="summary-box">
      <div class="summary-title">// ANALYSIS REPORT</div>
      <p class="summary-text" id="summary-text"></p>
    </div>

    <button class="btn-reset" onclick="resetAll()">↺ SCAN NEW IMAGE</button>
  </div>
</div>

<script>
  let imageBase64 = null;
  let imageType = null;

  const SYSTEM_PROMPT = `You are a world-class forensic AI image detection specialist with a BIAS TOWARD FLAGGING AI-GENERATED CONTENT. Your job is to find evidence of AI generation — assume suspicious until proven real. Modern AI image generators (Midjourney, DALL-E, Stable Diffusion, Flux, Firefly) are extremely convincing, so you must look harder than surface level.

CRITICAL RULES:
- Default assumption: the image is AI-generated unless you find strong evidence otherwise
- UNCERTAIN should lean toward AI_GENERATED, not REAL
- A score below 30 means you are very confident it's a real photograph — be very strict about this
- Most submitted images will be AI-generated; treat REAL as a rare verdict requiring clear photographic evidence

DETECTION SIGNALS TO EXAMINE DEEPLY:

1. TEXTURE ANALYSIS — AI images have hyper-smooth, "plastic" skin. Real photos have pores, micro-hairs, fine wrinkles, asymmetric blemishes. Look for: overly perfect skin, hair strands that merge/blur unnaturally, fabric textures that repeat or dissolve.

2. SYMMETRY CHECK — Real faces are asymmetric. AI faces trend toward near-perfect bilateral symmetry. Measure eye alignment, nostril size, ear placement, lip corners. Also check: perfectly centered compositions, unnaturally balanced backgrounds.

3. LIGHTING COHERENCE — Check if light direction is consistent across the entire scene. AI often has: multiple conflicting light sources, shadows pointing wrong directions, reflections in eyes inconsistent with environment, rim lighting with no logical source.

4. BACKGROUND ARTIFACTS — AI backgrounds frequently show: blurring that bleeds into subject edges, impossible bokeh patterns, repeated texture tiles, objects that are half-formed or morphed, garbled text/signs/logos, architectural elements that don't follow perspective rules.

5. ANATOMICAL ACCURACY — Count and inspect: fingers (AI often creates 6 or fused fingers), ears (often asymmetric or morphed), teeth (too perfect, too uniform, or fused), hairlines (AI hairlines often blur into foreheads), jewelry (AI struggles with clasps, chains), glasses (frames that distort or disconnect).

6. FREQUENCY PATTERNS — AI generators leave spectral artifacts: unnaturally smooth gradients in sky/backgrounds, noise patterns that are too uniform, absence of film grain or sensor noise, over-sharpened edges with soft interiors (sharpening halos), chromatic aberration missing where it should exist in optical lenses.

7. CONTEXTUAL REALISM — Real photos have: accidental elements (dust, slight motion blur, lens flare), imperfect framing, natural depth of field falloff. AI images often look "too composed," "too clean," "too perfect" — like a stock photo on steroids.

8. AI STYLE FINGERPRINTS — Look for Midjourney's characteristic painterly glow, DALL-E's flat lighting, Stable Diffusion's characteristic face morphology, Flux's hyper-real but slightly uncanny details.

Return ONLY a valid JSON object:
{
  "verdict": "AI_GENERATED" or "REAL" or "UNCERTAIN",
  "confidence": number 0-100,
  "score": number 0-100 (100 = definitely AI, 0 = definitely real photo),
  "signals": [
    { "label": "signal name", "detail": "specific observation with exact details of what you saw", "flagged": true or false }
  ],
  "summary": "2-3 sentences. Be specific about WHAT you saw that indicates AI or real. Name exact artifacts found."
}

Signals must include exactly these 6: Texture Analysis, Symmetry Check, Lighting Coherence, Background Artifacts, Anatomical Accuracy, Frequency Patterns.

SCORING GUIDE:
- 85-100: Strong AI artifacts found, high certainty AI generated
- 65-84: Multiple suspicious signals, likely AI
- 45-64: Mixed signals, uncertain but leaning AI
- 25-44: Mostly photographic evidence, possibly real but some anomalies
- 0-24: Strong evidence of real photograph, natural imperfections present`;

  function saveKey() {
    const key = document.getElementById('api-key').value.trim();
    const btn = document.getElementById('save-btn');
    if (key.startsWith('gsk_')) {
      sessionStorage.setItem('groq_key', key);
      btn.textContent = '✓ KEY SET';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'rgba(0,230,118,0.4)';
    } else {
      btn.textContent = '● READY';
      btn.style.color = '';
      btn.style.borderColor = '';
    }
  }

  function getKey() {
    return sessionStorage.getItem('groq_key') || document.getElementById('api-key').value.trim();
  }

  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.add('drag-over');
  }

  function handleDragLeave() {
    document.getElementById('drop-zone').classList.remove('drag-over');
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  }

  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    imageType = file.type;
    const reader = new FileReader();
    reader.onload = (e) => {
      const src = e.target.result;
      imageBase64 = src.split(',')[1];
      document.getElementById('preview-img').src = src;
      document.getElementById('drop-zone').style.display = 'none';
      document.getElementById('preview-panel').style.display = 'block';
      document.getElementById('analyze-btn').style.display = 'block';
      document.getElementById('results').style.display = 'none';
      document.getElementById('error-box').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  async function analyze() {
    const key = getKey();
    if (!key || !key.startsWith('gsk_')) {
      showError('Please enter a valid Groq API key (starts with gsk_) above.');
      return;
    }
    if (!imageBase64) return;

    document.getElementById('analyze-btn').style.display = 'none';
    document.getElementById('scan-overlay').classList.add('active');
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('results').style.display = 'none';

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`
        },
        body: JSON.stringify({
          model: 'meta-llama/llama-4-scout-17b-16e-instruct',
          max_tokens: 1000,
          response_format: { type: 'json_object' },
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            {
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: `data:${imageType};base64,${imageBase64}` } },
                { type: 'text', text: 'Carefully examine every pixel of this image for AI generation artifacts. Think step by step: first inspect the skin/textures, then symmetry, then lighting, then background, then anatomy, then frequency artifacts. Be suspicious — modern AI images look very realistic. Return only the JSON with your verdict.' }
              ]
            }
          ]
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.choices[0].message.content;
      const clean = text.replace(/```json|```/g, '').trim();
      const result = JSON.parse(clean);

      // Override: if score >= 45 and verdict is REAL, bump to UNCERTAIN
      if (result.score >= 45 && result.verdict === 'REAL') {
        result.verdict = 'UNCERTAIN';
      }
      // Override: if score >= 65 and verdict is UNCERTAIN, bump to AI_GENERATED
      if (result.score >= 65 && result.verdict === 'UNCERTAIN') {
        result.verdict = 'AI_GENERATED';
      }

      renderResult(result);
    } catch (err) {
      document.getElementById('scan-overlay').classList.remove('active');
      document.getElementById('analyze-btn').style.display = 'block';
      showError('Analysis failed: ' + (err.message || 'Check your API key and try again.'));
    }
  }

  function renderResult(r) {
    document.getElementById('scan-overlay').classList.remove('active');

    const configs = {
      AI_GENERATED: { label: 'AI GENERATED', color: '#ff3b3b', glow: 'rgba(255,59,59,0.35)', bar: 'linear-gradient(90deg,#ff6b3b,#ff3b3b)' },
      REAL:         { label: 'AUTHENTIC',     color: '#00e676', glow: 'rgba(0,230,118,0.35)', bar: 'linear-gradient(90deg,#00e676,#00c853)' },
      UNCERTAIN:    { label: 'UNCERTAIN',     color: '#ffb300', glow: 'rgba(255,179,0,0.35)',  bar: 'linear-gradient(90deg,#ffb300,#ff8f00)' },
    };

    const vc = configs[r.verdict] || configs.UNCERTAIN;

    // Banner
    const banner = document.getElementById('verdict-banner');
    banner.style.background = `rgba(${hexToRgb(vc.color)},0.07)`;
    banner.style.border = `1px solid ${vc.color}44`;
    banner.style.boxShadow = `0 0 50px ${vc.glow}`;

    const vt = document.getElementById('verdict-text');
    vt.textContent = vc.label;
    vt.style.color = vc.color;
    vt.style.textShadow = `0 0 40px ${vc.glow}`;

    document.getElementById('score-label').textContent = `AI SCORE: ${r.score}%`;
    document.getElementById('conf-label').textContent = `CONFIDENCE: ${r.confidence}%`;

    const fill = document.getElementById('score-fill');
    fill.style.background = vc.bar;
    fill.style.boxShadow = `0 0 12px ${vc.glow}`;
    setTimeout(() => { fill.style.width = r.score + '%'; }, 100);

    // Signals
    const grid = document.getElementById('signals-grid');
    grid.innerHTML = '';
    (r.signals || []).forEach((sig, i) => {
      const card = document.createElement('div');
      card.className = `signal-card fade-in ${sig.flagged ? 'flagged' : 'pass'}`;
      card.style.animationDelay = (i * 0.07) + 's';
      card.innerHTML = `
        <div class="signal-top">
          <span class="signal-name">${sig.label}</span>
          <span class="signal-badge ${sig.flagged ? 'flagged' : 'pass'}">${sig.flagged ? '⚠ FLAG' : '✓ PASS'}</span>
        </div>
        <div class="signal-detail">${sig.detail}</div>
      `;
      grid.appendChild(card);
    });

    document.getElementById('summary-text').textContent = r.summary;

    const results = document.getElementById('results');
    results.style.display = 'block';
    results.classList.add('fade-in');
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = 'block';
  }

  function resetAll() {
    imageBase64 = null;
    imageType = null;
    document.getElementById('drop-zone').style.display = 'block';
    document.getElementById('preview-panel').style.display = 'none';
    document.getElementById('analyze-btn').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('scan-overlay').classList.remove('active');
    document.getElementById('file-input').value = '';
    document.getElementById('score-fill').style.width = '0%';
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  }
  window.onload = () => {
    const saved = sessionStorage.getItem('groq_key');
    if (saved) {
      document.getElementById('api-key').value = saved;
      saveKey();
    }
  };

</script>
</body>
